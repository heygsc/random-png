name: Generate Random Image

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate image
        run: yarn generate

      - name: Commit generated image
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate random image"
          file_pattern: random.png
